name: Publish npm Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @bro-know-my/spark-analyzer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v1.2.3 or v1.2.3-beta.1, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "packages/spark-analyzer/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.version = process.env.VERSION;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Build package
        run: pnpm --dir packages/spark-analyzer run build

      - name: Check package contents
        run: pnpm --dir packages/spark-analyzer run pack:dry

      - name: Publish package
        working-directory: packages/spark-analyzer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
